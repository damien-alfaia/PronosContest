<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pronostics" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="PronosticsContest — concours de pronostics sportifs entre amis."
    />

    <!-- Open Graph (Facebook / LinkedIn / Discord previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PronosticsContest" />
    <meta property="og:title" content="PronosticsContest" />
    <meta
      property="og:description"
      content="Concours de pronostics sportifs — prédisez, affrontez vos amis, grimpez au classement en direct."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PronosticsContest" />
    <meta
      name="twitter:description"
      content="Concours de pronostics sportifs — prédisez, affrontez vos amis, grimpez au classement en direct."
    />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- Preconnect fonts (Inter + JetBrains Mono) pour accélérer le
         premier rendu. Le @import CSS reste la source (dans globals.css)
         mais preconnect ouvre la connexion TLS à l'avance. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>PronosticsContest v2</title>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
